const fonte =
document.getElementById("cifraFonte");

const render =
document.getElementById("cifraRenderizada");

const select =
document.getElementById("instrumento");

function transporAcorde(acorde,semitons){

    const match =
    acorde.match(/^([A-G](#)?)(.*)$/);

    if(!match)
        return acorde;

    let nota = match[1];
    let resto = match[3];

    let indice =
    notas.indexOf(nota);

    if(indice === -1)
        return acorde;

    indice += semitons;

    while(indice < 0)
        indice += 12;

    indice %= 12;

    return notas[indice] + resto;
}

function gerarLinha(texto){

    let acordes = "";
    let letra = "";

    let i = 0;

    while(i < texto.length){

        if(texto[i] === "["){

            let fim =
            texto.indexOf("]",i);

            if(fim === -1)
                break;

            let acorde =
            texto.substring(i+1,fim);

            acorde =
            transporAcorde(
                acorde,
                deslocamentoTom
            );

            while(
                acordes.length <
                letra.length
            ){
                acordes += " ";
            }

            acordes += acorde;

            i = fim + 1;

            continue;
        }

        letra += texto[i];

        if(acordes.length <
           letra.length){

            acordes += " ";
        }

        i++;
    }

    return {
        acordes,
        letra
    };
}

function renderizar(){

    render.innerHTML = "";

    const linhas =
    fonte.value.split("\n");

    linhas.forEach(texto=>{

        const resultado =
        gerarLinha(texto);

        if(
            resultado.letra.trim()==="" &&
            resultado.acordes.trim()===""
        ){
            render.innerHTML +=
            "<br>";
            return;
        }

        const linhaA =
        document.createElement("div");

        linhaA.className =
        "linha-acordes";

        linhaA.textContent =
        resultado.acordes;

        const linhaL =
        document.createElement("div");

        linhaL.className =
        "linha-letra";

        linhaL.textContent =
        resultado.letra;

        render.appendChild(linhaA);
        render.appendChild(linhaL);

    });

}

function transpor(valor){

    deslocamentoTom += valor;

    document
    .getElementById("tomAtual")
    .textContent =
    (deslocamentoTom > 0 ? "+" : "")
    + deslocamentoTom;

    renderizar();
}

select.addEventListener(
"change",
()=>{
    fonte.value =
    musicas[
        select.value
    ];

    renderizar();
});

let scrollAtivo = false;
let scrollTimer;

function toggleScroll(){

    if(scrollAtivo){

        clearInterval(
        scrollTimer
        );

        scrollAtivo = false;
        return;
    }

    scrollAtivo = true;

    scrollTimer =
    setInterval(()=>{

        let velocidade =
        Number(
        document
        .getElementById(
        "velocidade"
        ).value);

        window.scrollBy(
            0,
            velocidade
        );

    },100);

}

fonte.value =
musicas[
select.value
];

renderizar();
