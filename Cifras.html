<title>Louvores</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:Arial, Helvetica, sans-serif;
    }

    body{
        background:#000;
        min-height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
    }

    .container{
        width:90%;
        max-width:1200px;
        display:grid;
        grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
        gap:20px;
    }

    .card{
        height:140px;
        background:linear-gradient(135deg,#1f1f1f,#2e2e2e);
        border:1px solid #444;
        border-radius:16px;
        display:flex;
        justify-content:center;
        align-items:center;
        text-decoration:none;
        color:white;
        font-size:1.2rem;
        font-weight:bold;
        transition:0.3s;
        overflow:hidden;
        position:relative;
    }

    .card::before{
        content:"";
        position:absolute;
        top:0;
        left:-100%;
        width:100%;
        height:100%;
        background:linear-gradient(
            90deg,
            transparent,
            rgba(255,255,255,0.15),
            transparent
        );
        transition:0.6s;
    }

    .card:hover{
        transform:translateY(-8px) scale(1.03);
        border-color:#777;
        box-shadow:0 0 25px rgba(255,255,255,0.15);
    }

    .card:hover::before{
        left:100%;
    }
</style>
</head>
